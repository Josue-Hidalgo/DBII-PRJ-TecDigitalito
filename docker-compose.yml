services:
  backend:
    build: ./backend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - cassandra
      - mongo
      - neo4j
      - redis
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/tecdigitalito_mongo_db
      - NEO4J_URI=bolt://neo4j:7687/tecdigitalito_neo4j_db
      - REDIS_URI=redis://redis:6379/tecdigitalito_redis_db
      - CASSANDRA_URI=cassandra://cassandra:9042/tecdigitalito_cassandra_db
    networks:
      - app-network

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/TecDigitalito/dist:/usr/share/nginx/html
    networks:
      - app-network

  cassandra:
    image: cassandra:latest
    restart: always
    volumes:
      - cassandra-data:/var/lib/cassandra
    networks:
      - app-network

  mongo:
    image: mongo:latest
    restart: always
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  neo4j:
    image: neo4j:latest
    restart: always
    environment:
      - NEO4J_AUTH=neo4j/neo4j-pw
    volumes:
      - neo4j-data:/data
    networks:
      - app-network

  redis:
    image: redis:latest
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - app-network

volumes:
  neo4j-data:
  cassandra-data:
  redis-data:
  mongo-data:

networks:
  app-network: