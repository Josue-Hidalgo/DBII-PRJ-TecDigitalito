services:
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile
      target: backend
    restart: always
    env_file:
      - ./Backend/.env
    depends_on:
      - cassandra
      - mongo
      - neo4j
      - redis
    networks:
      - app-network

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./Frontend/dist:/usr/share/nginx/html
    networks:
      - app-network

  cassandra:
    image: cassandra:latest
    restart: always
    environment:
      - CASSANDRA_CLUSTER_NAME=TecDigitalitoCluster
    volumes:
      - cassandra-data:/var/lib/cassandra
    networks:
      - app-network

  mongo:
    image: mongo:latest
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password123
      - MONGO_INITDB_DATABASE=tecdigitalito_mongo_db
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  neo4j:
    image: neo4j:latest
    restart: always
    environment:
      - NEO4J_AUTH=neo4j/neo4j-pw
      - NEO4J_DATABASE=tecdigitalito_neo4j_db
    volumes:
      - neo4j-data:/data
    networks:
      - app-network

  redis:
    image: redis:latest
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - app-network

volumes:
  neo4j-data:
  cassandra-data:
  redis-data:
  mongo-data:

networks:
  app-network: