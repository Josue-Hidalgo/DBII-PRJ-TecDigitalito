version: '3.8'
services:
  frontend:
    build: ./frontend
    container_name: dbii-prj1-frontend
    restart: always
    ports:
      - 4200:4200 
  backend:
    build: ./backend
    container_name: dbii-prj1-backend
    restart: always
    ports:
      - 3000:3000 
    depends_on:
    - cassandra
    - mongo
    - neo4j
    - redis
  nginx:
    container_name: dbii-prj1-nginx
    restart: always 
    image: nginx:1.29.7
    ports:
      - "80:80"
      - "443:443"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=mongo
      - MONGO_INITDB_ROOT_PASSWORD=mongo_pw
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - backend
  cassandra:
    container_name: dbii-prj1-cassandra-db
    restart: always
    image: cassandra:5.0.7
    volumes:
      - cassandra-data:/var/lib/cassandra/data/
  mongo:
    container_name: dbii-prj1-mongo-db
    restart: always
    image: mongo:8.2.7
    volumes:
      - mongo-data:/data/db
  neo4j:
    container_name: dbii-prj1-neo4j-db
    restart: always
    ports:
      - "7474:7474"   # UI web
      - "7687:7687"   # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/neo4j-pw
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
    volumes:
      - neo4j-data:/data
  redis:
    container_name: dbii-prj1-redis-db
    restart: always
    image: redis:8.6.2
    volumes:
      - redis-data:/data
volumes:
  neo4j-data:
  cassandra-data:
  redis-data:
  mongo-data: 