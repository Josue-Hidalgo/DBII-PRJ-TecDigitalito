version: '3.8'

services:
  frontend:
    build: ./frontend
    command: npm run build
    volumes:
      - ./frontend/dist:/app/dist
    networks:
      - app-network

  backend:
    build: ./backend
    restart: always
    depends_on:
      - cassandra
      - mongo
      - neo4j
      - redis
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/tecdigitalito_mongo_db
      - NEO4J_URI=bolt://neo4j:7687/tecdigitalito_neo4j_db
      - REDIS_URI=redis://redis:6379/tecdigitalito_redis_db
      - CASSANDRA_URI=cassandra://cassandra:9042/tecdigitalito_cassandra_db
    networks:
      - app-network

  nginx:
    image: nginx:1.29.7
    restart: always
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html
    networks:
      - app-network

  cassandra:
    image: cassandra:5.0.7
    restart: always
    volumes:
      - cassandra-data:/var/lib/cassandra
    networks:
      - app-network

  mongo:
    image: mongo:8.2.7
    restart: always
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  neo4j:
    image: neo4j:2026.02.3
    restart: always
    environment:
      - NEO4J_AUTH=neo4j/neo4j-pw
    volumes:
      - neo4j-data:/data
    networks:
      - app-network

  redis:
    image: redis:8.6.2
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - app-network

volumes:
  neo4j-data:
  cassandra-data:
  redis-data:
  mongo-data:

networks:
  app-network: