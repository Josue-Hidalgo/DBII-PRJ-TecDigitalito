version: '3.8'

services:
  frontend:
    build: ./frontend
    container_name: dbii-prj1-frontend
    restart: always
    ports:
      - 4200:4200 
  backend:
    build: ./backend
    container_name: dbii-prj1-backend
    restart: always
    ports:
      - 3000:3000 
    depends_on:
    - cassandra
    - mongo
    - neo4j
    - redis
  cassandra:
    container_name: dbii-prj1-cassandra-db
    restart: always
    image: cassandra:5.0.7
    ports:
      - "9042:9042"
    volumes:
      - cassandra-data:/var/lib/cassandra/data/
  mongo:
    container_name: dbii-prj1-mongo-db
    restart: always
    image: mongo:8.2.7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
  neo4j:
    container_name: dbii-prj1-neo4j-db
    restart: always
    image: neo4j:2026.02.3
    ports:
      - "7473:7473"
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/neo4j-pw
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
    volumes:
      - neo4j-data:/data
  redis:
    container_name: dbii-prj1-redis-db
    restart: always
    image: redis:8.6.2
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
  nginx:
    container_name: dbii-prj1-nginx
    restart: always 
    image: nginx:1.29.7
    ports:
      - "80:80"
      - "443:443"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=mongo
      - MONGO_INITDB_ROOT_PASSWORD=mongo_pw
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - backend

volumes:
  neo4j-data:
  cassandra-data:
  redis-data:
  mongo-data: 