version: '3.8'

services:
  backend:
    build: ./backend
    restart: always
    depends_on:
      - cassandra
      - mongo
      - neo4j
      - redis

  nginx:
    image: nginx:1.29.7
    restart: always
    depends_on:
      - backend

  cassandra:
    image: cassandra:5.0.7
    volumes:
      - cassandra-data:/var/lib/cassandra

  mongo:
    image: mongo:8.2.7
    volumes:
      - mongo-data:/data/db

  neo4j:
    image: neo4j:2026.02.3
    environment:
      - NEO4J_AUTH=neo4j/neo4j-pw
    volumes:
      - neo4j-data:/data

  redis:
    image: redis:8.6.2
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

volumes:
  neo4j-data:
  cassandra-data:
  redis-data:
  mongo-data: