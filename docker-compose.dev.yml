services:
  frontend:
    image: node:20
    build: 
      context: ./frontend
      dockerfile: ../docker/Dockerfile.dev
    working_dir: /app
    volumes:
      - ./frontend/TecDigitalito:/app
      - /app/node_modules
    ports:
      - "4200:4200"
    command: >
      bash -c "
      npm install -g @angular/cli &&
      npm install &&
      ng serve --host 0.0.0.0
      "
    networks:
      - app-network

  backend:
    ports:
      - "3000:3000"
    command: npm run dev
    volumes:
      - ./backend:/app
      - /app/node_modules
    working_dir: /app
    environment:
      - NODE_ENV=development
    networks:
      - app-network

  mongo:
    ports:
      - "27017:27017"
    networks:
      - app-network

  neo4j:
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - app-network

  cassandra:
    ports:
      - "9042:9042"
    networks:
      - app-network

  redis:
    ports:
      - "6379:6379"
    networks:
      - app-network

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-network