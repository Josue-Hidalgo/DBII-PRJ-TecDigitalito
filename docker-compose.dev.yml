services:
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    networks:
      - app-network

  backend:
    ports:
      - "3000:3000"
    command: npm run dev
    volumes:
      - ./backend:/app
      - /app/node_modules
    working_dir: /app
    environment:
      - NODE_ENV=development
    networks:
      - app-network

  mongo:
    ports:
      - "27017:27017"
    networks:
      - app-network

  neo4j:
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - app-network

  cassandra:
    ports:
      - "9042:9042"
    networks:
      - app-network

  redis:
    ports:
      - "6379:6379"
    networks:
      - app-network

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/TecDigitalito/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro