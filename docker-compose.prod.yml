services:
  frontend:
    build: 
      context: ./frontend
      dockerfile: ../docker/Dockerfile.prod
    networks:
      - app-network

  nginx:
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/TecDigitalito/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
    networks:
      - app-network

